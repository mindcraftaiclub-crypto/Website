<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindcraft AI | Members Directory</title>
  <meta name="description" content="Meet the leadership team and registered general members of the Mindcraft AI Club.">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css">
  <style>
    /* Leadership styling */
    .leadership-section {
      margin-bottom: 4.5rem;
    }
    .leadership-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem;
    }
    .leader-card {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 2.5rem 2rem;
    }
    .leader-avatar-wrapper {
      position: relative;
      margin-bottom: 1.5rem;
    }
    .leader-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid hsl(var(--accent-primary));
      box-shadow: 0 0 15px hsla(var(--accent-primary), 0.3);
    }
    .leader-crown-badge {
      position: absolute;
      top: -5px;
      right: 5px;
      background: linear-gradient(135deg, hsl(45, 90%, 55%), hsl(35, 90%, 50%));
      color: white;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }
    .leader-role {
      font-weight: 700;
      color: hsl(var(--accent-secondary));
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      margin-bottom: 0.25rem;
    }
    
    /* General member cards */
    .member-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem;
    }
    .member-card {
      display: flex;
      gap: 1.25rem;
      align-items: flex-start;
      padding: 1.5rem;
    }
    .member-photo {
      width: 70px;
      height: 70px;
      border-radius: 12px;
      object-fit: cover;
      border: 1px solid var(--glass-border);
    }
    .member-details {
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }
    .member-skills-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-top: 0.75rem;
    }
    .member-skill-badge {
      font-size: 0.7rem;
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.25);
      color: hsl(var(--accent-primary));
      padding: 0.15rem 0.5rem;
      border-radius: 6px;
      font-weight: 600;
    }
    .member-socials-row {
      display: flex;
      gap: 0.75rem;
      margin-top: 0.75rem;
    }
    .member-socials-row a {
      color: hsl(var(--text-muted));
      font-size: 0.9rem;
    }
    .member-socials-row a:hover {
      color: hsl(var(--text-primary));
    }
  </style>
</head>
<body>

  <div class="app-container">
    <!-- Sidebar Container -->
    <div id="sidebar-container"></div>
    
    <!-- Main Content Area -->
    <main class="main-content">
      <!-- Top Bar Container -->
      <div id="topbar-container"></div>
      
      <!-- PAGE HEADER -->
      <div class="page-header animated-entrance">
        <span class="page-tag"><i class="fa-solid fa-users"></i> Directory</span>
        <h2 class="page-title">Club Members</h2>
        <p class="page-subtitle">Browse through the core leadership team and the dedicated student members of the Mindcraft AI engineering space.</p>
      </div>

      <!-- LEADERSHIP SECTION -->
      <section class="leadership-section animated-entrance" style="animation-delay: 0.1s;">
        <h3 style="font-size: 1.5rem; margin-bottom: 2rem;"><i class="fa-solid fa-crown" style="color: hsl(45, 90%, 55%);"></i> Core Board Leadership</h3>
        <div class="leadership-grid" id="core-members-container">
          <!-- Core Members Injected here -->
        </div>
      </section>

      <!-- MEMBERS SECTION WITH FILTERS -->
      <section class="animated-entrance" style="animation-delay: 0.2s;">
        <h3 style="font-size: 1.5rem; margin-bottom: 2rem;"><i class="fa-solid fa-user-group" style="color: hsl(var(--accent-primary));"></i> General Registry</h3>
        
        <!-- Filter and Search Bar -->
        <div class="filter-bar">
          <div class="filter-group">
            <span style="font-size: 0.85rem; font-weight: 600; color: var(--text-muted);"><i class="fa-solid fa-filter"></i> Filters:</span>
            <select class="filter-select" id="filter-dept">
              <option value="all">All Departments</option>
              <option value="Computer Science">Computer Science</option>
              <option value="Information Technology">Information Technology</option>
              <option value="Electronics">Electronics</option>
            </select>
            <select class="filter-select" id="filter-year">
              <option value="all">All Years</option>
              <option value="1">Year 1</option>
              <option value="2">Year 2</option>
              <option value="3">Year 3</option>
              <option value="4">Year 4</option>
            </select>
          </div>
          <div>
            <span style="font-size: 0.8rem; color: var(--text-muted);" id="results-counter">Found 0 members</span>
          </div>
        </div>

        <!-- Members Grid -->
        <div class="member-grid" id="general-members-container">
          <!-- General members card inject -->
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination-controls">
          <!-- Pagination buttons inject -->
        </div>
      </section>

    </main>
  </div>

  <script type="module" src="db.js"></script>
  <script type="module" src="shared.js"></script>
  <script type="module">
    const ITEMS_PER_PAGE = 6;
    let currentPage = 1;
    let filteredUsers = [];

    document.addEventListener('DOMContentLoaded', () => {
      // Setup elements
      window.injectTopBar('topbar-container');
      
      // Load Core Leadership
      loadCoreMembers();

      // Load Registry and bind events
      initRegistry();
    });

    async function loadCoreMembers() {
      if (!window.db) return;
      const core = await window.db.find('CoreMembers');
      const container = document.getElementById('core-members-container');
      
      container.innerHTML = core.map(member => `
        <div class="glass-card leader-card">
          <div class="glass-card-glow"></div>
          <div class="leader-avatar-wrapper">
            <img class="leader-avatar" src="${member.photo}" alt="${member.name}">
            <div class="leader-crown-badge"><i class="fa-solid fa-crown"></i></div>
          </div>
          <span class="leader-role">${member.role}</span>
          <h4 style="font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem;">${member.name}</h4>
          <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 1rem;">${member.department}, Year ${member.year}</p>
          <div style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem;">
            <i class="fa-solid fa-envelope"></i> ${member.email}
          </div>
          <div class="team-socials" style="margin-top: auto;">
            <a href="${member.github}" target="_blank" class="social-btn" style="width:36px; height:36px; font-size: 0.9rem;"><i class="fa-brands fa-github"></i></a>
            <a href="${member.linkedin}" target="_blank" class="social-btn" style="width:36px; height:36px; font-size: 0.9rem;"><i class="fa-brands fa-linkedin-in"></i></a>
          </div>
        </div>
      `).join('');
    }

    async function initRegistry() {
      if (!window.db) return;
      const users = await window.db.find('Users');
      
      const filterDept = document.getElementById('filter-dept');
      const filterYear = document.getElementById('filter-year');
      
      // Check query search parameter
      const params = new URLSearchParams(window.location.search);
      const initialSearch = params.get('search') || '';

      const applyFilters = () => {
        const searchVal = document.querySelector('.global-search-input')?.value.toLowerCase() || '';
        const deptVal = filterDept.value;
        const yearVal = filterYear.value;

        filteredUsers = users.filter(user => {
          // Check search query against name, department, or skills
          const matchSearch = !searchVal || 
                              user.name.toLowerCase().includes(searchVal) ||
                              user.department.toLowerCase().includes(searchVal) ||
                              user.skills.some(skill => skill.toLowerCase().includes(searchVal));

          const matchDept = deptVal === 'all' || user.department === deptVal;
          const matchYear = yearVal === 'all' || user.year === yearVal;

          return matchSearch && matchDept && matchYear;
        });

        currentPage = 1;
        renderRegistry();
      };

      filterDept.addEventListener('change', applyFilters);
      filterYear.addEventListener('change', applyFilters);

      // Listen to input changes in the global search box as well
      setTimeout(() => {
        const searchInput = document.querySelector('.global-search-input');
        if (searchInput) {
          searchInput.addEventListener('input', applyFilters);
        }
      }, 500);

      applyFilters(); // Initial run
    }

    function renderRegistry() {
      const container = document.getElementById('general-members-container');
      const counter = document.getElementById('results-counter');
      const paginationControls = document.getElementById('pagination-controls');

      counter.textContent = `Found ${filteredUsers.length} members`;

      if (filteredUsers.length === 0) {
        container.innerHTML = `
          <div class="glass-card" style="grid-column: 1 / -1; text-align: center; padding: 3rem;">
            <i class="fa-solid fa-magnifying-glass-minus" style="font-size: 2.5rem; color: var(--text-muted); margin-bottom: 1rem;"></i>
            <h4 style="font-size: 1.25rem;">No members match the query parameters</h4>
            <p style="color: var(--text-secondary); margin-top: 0.5rem;">Try modifying search strings or clearing filters.</p>
          </div>
        `;
        paginationControls.innerHTML = '';
        return;
      }

      // Paginated slice
      const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
      const paginatedUsers = filteredUsers.slice(startIndex, startIndex + ITEMS_PER_PAGE);

      container.innerHTML = paginatedUsers.map(user => {
        const skillBadges = user.skills.length > 0
          ? user.skills.map(s => `<span class="member-skill-badge">${s}</span>`).join('')
          : '<span style="font-size: 0.75rem; color: var(--text-muted); font-style: italic;">No skills listed</span>';
        
        return `
          <div class="glass-card member-card animated-entrance">
            <img class="member-photo" src="${user.photo}" alt="${user.name}">
            <div class="member-details">
              <h4 style="font-size: 1.15rem; font-weight: 700; margin-bottom: 0.15rem;">${user.name}</h4>
              <span style="font-size: 0.8rem; color: hsl(var(--accent-primary)); font-weight: 600; text-transform: uppercase;">${user.position}</span>
              <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem;">
                ${user.department} &bull; Year ${user.year}
              </p>
              
              <div class="member-skills-list">
                ${skillBadges}
              </div>

              <div class="member-socials-row">
                <a href="${user.github || '#'}" target="_blank" title="GitHub"><i class="fa-brands fa-github"></i></a>
                <a href="${user.linkedin || '#'}" target="_blank" title="LinkedIn"><i class="fa-brands fa-linkedin"></i></a>
                <a href="mailto:${user.email}" title="Email"><i class="fa-solid fa-envelope"></i></a>
              </div>
            </div>
          </div>
        `;
      }).join('');

      // Render pagination buttons
      const totalPages = Math.ceil(filteredUsers.length / ITEMS_PER_PAGE);
      if (totalPages <= 1) {
        paginationControls.innerHTML = '';
        return;
      }

      let pagHtml = `
        <button class="pagination-btn" id="pagination-prev" ${currentPage === 1 ? 'disabled' : ''}><i class="fa-solid fa-chevron-left"></i></button>
      `;

      for (let i = 1; i <= totalPages; i++) {
        pagHtml += `
          <button class="pagination-btn ${currentPage === i ? 'active' : ''}" data-page="${i}">${i}</button>
        `;
      }

      pagHtml += `
        <button class="pagination-btn" id="pagination-next" ${currentPage === totalPages ? 'disabled' : ''}><i class="fa-solid fa-chevron-right"></i></button>
      `;

      paginationControls.innerHTML = pagHtml;

      // Event handlers
      document.getElementById('pagination-prev').addEventListener('click', () => {
        if (currentPage > 1) {
          currentPage--;
          renderRegistry();
        }
      });

      document.getElementById('pagination-next').addEventListener('click', () => {
        if (currentPage < totalPages) {
          currentPage++;
          renderRegistry();
        }
      });

      paginationControls.querySelectorAll('button[data-page]').forEach(btn => {
        btn.addEventListener('click', () => {
          currentPage = parseInt(btn.getAttribute('data-page'));
          renderRegistry();
        });
      });
    }
  </script>
</body>
</html>
