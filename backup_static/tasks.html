<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindcraft AI | Weekly Tasks</title>
  <meta name="description" content="Submit code implementations, user interface designs, and vector components for weekly challenges conducted by Mindcraft AI.">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css">
  <style>
    .tasks-container {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 2rem;
      margin-bottom: 4rem;
    }
    .task-card {
      margin-bottom: 1.5rem;
    }
    .task-deadline-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.8rem;
      font-weight: 700;
      color: hsl(var(--accent-tertiary));
      background: rgba(255, 60, 120, 0.1);
      border: 1px solid rgba(255, 60, 120, 0.25);
      padding: 0.25rem 0.75rem;
      border-radius: 6px;
      margin-bottom: 1rem;
    }
    .task-deadline-badge.expired {
      color: var(--text-muted);
      background: rgba(255,255,255,0.05);
      border-color: var(--glass-border);
    }
    
    /* Upload mock area */
    .upload-zone {
      border: 2px dashed var(--glass-border);
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
      background: rgba(0,0,0,0.1);
      cursor: pointer;
      transition: all var(--transition-fast);
      margin-top: 1rem;
    }
    .upload-zone:hover {
      border-color: hsl(var(--accent-primary));
      background: rgba(139, 92, 246, 0.05);
    }
    .upload-file-details {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-weight: 600;
      color: hsl(var(--accent-secondary));
      margin-top: 0.5rem;
    }

    .submission-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 0.5rem;
    }
    .status-badge {
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      text-transform: uppercase;
    }
    .status-Approved { background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.3); color: rgb(52, 211, 153); }
    .status-Pending { background: rgba(245, 158, 11, 0.15); border: 1px solid rgba(245, 158, 11, 0.3); color: rgb(251, 191, 36); }
    .status-Rejected { background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); color: rgb(248, 113, 113); }
  </style>
</head>
<body>

  <div class="app-container">
    <!-- Sidebar Container -->
    <div id="sidebar-container"></div>
    
    <!-- Main Content Area -->
    <main class="main-content">
      <!-- Top Bar Container -->
      <div id="topbar-container"></div>
      
      <!-- PAGE HEADER -->
      <div class="page-header animated-entrance">
        <span class="page-tag"><i class="fa-solid fa-square-check"></i> Sprints</span>
        <h2 class="page-title">Weekly Challenges</h2>
        <p class="page-subtitle">Submit your files, review active challenge objectives, and monitor task acceptance status directly from your registry dashboard.</p>
      </div>

      <!-- MAIN LAYOUT -->
      <div class="tasks-container animated-entrance" style="animation-delay: 0.1s;">
        <!-- Left: Active & Past Tasks -->
        <div>
          <h3 style="font-size: 1.4rem; margin-bottom: 1.5rem;"><i class="fa-solid fa-fire" style="color: hsl(var(--accent-tertiary));"></i> Active Work Assignments</h3>
          <div id="active-tasks-list" style="display:flex; flex-direction:column; gap:1.5rem; margin-bottom: 3rem;">
            <!-- Active injected here -->
          </div>
          
          <h3 style="font-size: 1.4rem; margin-bottom: 1.5rem;"><i class="fa-solid fa-folder-closed" style="color: var(--text-muted);"></i> Expired / Past Assignments</h3>
          <div id="past-tasks-list" style="display:flex; flex-direction:column; gap:1.5rem;">
            <!-- Expired injected here -->
          </div>
        </div>

        <!-- Right: Submission History status -->
        <div class="glass-card" style="height: fit-content;">
          <div class="glass-card-glow"></div>
          <h3 style="margin-bottom: 1.5rem;"><i class="fa-solid fa-chart-line" style="color: hsl(var(--accent-secondary));"></i> Submission Overview</h3>
          <div id="user-submissions-list">
            <!-- Submissions list injected here -->
          </div>
        </div>
      </div>

    </main>
  </div>

  <script src="db.js"></script>
  <script src="shared.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      window.injectTopBar('topbar-container');

      // Auth Guard
      if (!window.requireAuth()) return;

      loadTasks();
    });

    async function loadTasks() {
      if (!window.db) return;
      const tasks = await window.db.find('WeeklyTasks');
      const submissions = await window.db.find('TaskSubmissions');
      const currentUser = window.db.getCurrentUser();

      const activeList = document.getElementById('active-tasks-list');
      const pastList = document.getElementById('past-tasks-list');
      const summaryList = document.getElementById('user-submissions-list');

      const now = new Date('2026-06-26T16:06:00+05:30'); // User local context

      const activeTasks = tasks.filter(t => new Date(t.deadline) > now);
      const expiredTasks = tasks.filter(t => new Date(t.deadline) <= now);

      // 1. Render Active Tasks
      if (activeTasks.length === 0) {
        activeList.innerHTML = `<p style="color: var(--text-muted); font-style: italic;">No active assignments currently posted.</p>`;
      } else {
        activeList.innerHTML = activeTasks.map(t => {
          // Check if already submitted
          const sub = submissions.find(s => s.taskId === t.id && s.userId === currentUser.id);
          
          let actionMarkup = '';
          if (sub) {
            actionMarkup = `
              <div style="margin-top: 1.5rem; padding: 1rem; border-radius: 8px; background: rgba(0,229,255,0.05); border: 1px solid rgba(0,229,255,0.2); font-size: 0.9rem;">
                <i class="fa-solid fa-circle-check" style="color: hsl(var(--accent-secondary));"></i> Already submitted: <strong>${sub.fileName}</strong> (${sub.status})
              </div>
            `;
          } else {
            actionMarkup = `
              <form onsubmit="submitTaskForm(event, '${t.id}', '${t.title}')" style="margin-top: 1.5rem;">
                <div class="upload-zone" onclick="triggerFileInput('${t.id}')">
                  <i class="fa-solid fa-cloud-arrow-up" style="font-size: 1.75rem; color: var(--text-muted); margin-bottom: 0.5rem; display:block;"></i>
                  <span id="upload-lbl-${t.id}">Drag and drop files or Click to Browse</span>
                  <div class="upload-file-details" id="file-details-${t.id}">
                    <i class="fa-solid fa-file-code"></i> <span id="file-name-${t.id}"></span>
                  </div>
                  <input type="file" id="file-input-${t.id}" style="display:none;" onchange="handleFileSelection('${t.id}')" required>
                </div>
                <button type="submit" class="btn btn-primary btn-sm" style="margin-top: 1rem; width:100%; justify-content:center; border-radius:8px;">
                  Submit Files <i class="fa-solid fa-paper-plane"></i>
                </button>
              </form>
            `;
          }

          const deadlineStr = new Date(t.deadline).toLocaleString();

          return `
            <div class="glass-card task-card animated-entrance">
              <div class="glass-card-glow"></div>
              <div class="task-deadline-badge"><i class="fa-solid fa-clock"></i> Deadline: ${deadlineStr}</div>
              <h4 style="font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; color:#fff;">${t.title}</h4>
              <p style="font-size: 0.95rem; color: var(--text-secondary); line-height: 1.5;">${t.description}</p>
              ${actionMarkup}
            </div>
          `;
        }).join('');
      }

      // 2. Render Expired Tasks
      if (expiredTasks.length === 0) {
        pastList.innerHTML = `<p style="color: var(--text-muted); font-style: italic;">No past history archive.</p>`;
      } else {
        pastList.innerHTML = expiredTasks.map(t => {
          const deadlineStr = new Date(t.deadline).toLocaleString();
          return `
            <div class="glass-card task-card animated-entrance" style="opacity: 0.75;">
              <div class="task-deadline-badge expired"><i class="fa-solid fa-calendar-xmark"></i> Closed: ${deadlineStr}</div>
              <h4 style="font-size: 1.15rem; font-weight: 700; margin-bottom: 0.5rem; color:var(--text-secondary);">${t.title}</h4>
              <p style="font-size: 0.9rem; color: var(--text-muted); line-height: 1.4;">${t.description}</p>
            </div>
          `;
        }).join('');
      }

      // 3. Render Submission History overview
      const mySubmissions = submissions.filter(s => s.userId === currentUser.id);
      if (mySubmissions.length === 0) {
        summaryList.innerHTML = `<p style="color: var(--text-muted); font-style: italic;">No submissions logged.</p>`;
      } else {
        summaryList.innerHTML = mySubmissions.map(s => `
          <div class="submission-row">
            <div>
              <strong style="display:block; text-overflow:ellipsis; overflow:hidden; white-space:nowrap; max-width: 180px;">${s.taskTitle}</strong>
              <span style="font-size: 0.75rem; color: var(--text-muted);">${s.fileName}</span>
            </div>
            <span class="status-badge status-${s.status}">${s.status}</span>
          </div>
        `).join('');
      }
    }

    function triggerFileInput(taskId) {
      document.getElementById(`file-input-${taskId}`).click();
    }

    function handleFileSelection(taskId) {
      const input = document.getElementById(`file-input-${taskId}`);
      const lbl = document.getElementById(`upload-lbl-${taskId}`);
      const details = document.getElementById(`file-details-${taskId}`);
      const nameEl = document.getElementById(`file-name-${taskId}`);

      if (input.files.length > 0) {
        const file = input.files[0];
        lbl.style.display = 'none';
        details.style.display = 'flex';
        nameEl.textContent = file.name;
      }
    }

    async function submitTaskForm(e, taskId, taskTitle) {
      e.preventDefault();
      const input = document.getElementById(`file-input-${taskId}`);
      const currentUser = window.db.getCurrentUser();
      
      if (!input.files || input.files.length === 0) {
        window.showToast('File Required', 'Please select a code file before submitting.', 'warning');
        return;
      }

      const fileName = input.files[0].name;

      const newSubmission = {
        taskId: taskId,
        taskTitle: taskTitle,
        userId: currentUser.id,
        userName: currentUser.name,
        fileName: fileName,
        submittedAt: new Date().toISOString(),
        status: 'Pending'
      };

      try {
        if (window.db) {
          await window.db.insert('TaskSubmissions', newSubmission);
          window.showToast('Submission Logged', 'Task file uploaded to repository checklist successfully.', 'success');
          loadTasks();
        }
      } catch(err) {
        window.showToast('Submission Failed', err.message, 'error');
      }
    }
  </script>
</body>
</html>
