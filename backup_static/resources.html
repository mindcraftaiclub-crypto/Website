<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindcraft AI | Resources Vault</title>
  <meta name="description" content="Access PPT presentations, PDF documents, research guides, and video workshops compiled by Mindcraft AI.">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css">
  <style>
    .resources-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
    }
    .resource-card {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .resource-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
    }
    .resource-icon-wrapper {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }
    .resource-size-badge {
      font-size: 0.75rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      padding: 0.25rem 0.6rem;
      border-radius: 6px;
      color: var(--text-secondary);
    }
    .res-type-pdf { background: rgba(239, 68, 68, 0.15); color: rgb(248, 113, 113); }
    .res-type-ppt { background: rgba(245, 158, 11, 0.15); color: rgb(251, 191, 36); }
    .res-type-notes { background: rgba(16, 185, 129, 0.15); color: rgb(52, 211, 153); }
    .res-type-research { background: rgba(139, 92, 246, 0.15); color: rgb(167, 139, 250); }
    .res-type-videos { background: rgba(59, 130, 246, 0.15); color: rgb(96, 165, 250); }
    .res-type-links { background: rgba(0, 229, 255, 0.15); color: hsl(180, 100%, 45%); }

    .resource-download-btn {
      width: 100%;
      justify-content: center;
      margin-top: auto;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <!-- Sidebar Container -->
    <div id="sidebar-container"></div>
    
    <!-- Main Content Area -->
    <main class="main-content">
      <!-- Top Bar Container -->
      <div id="topbar-container"></div>
      
      <!-- PAGE HEADER -->
      <div class="page-header animated-entrance">
        <span class="page-tag"><i class="fa-solid fa-book"></i> Vault</span>
        <h2 class="page-title">Resource Repository</h2>
        <p class="page-subtitle">Download engineering documentation, lecture slides, algorithmic notes, and research compilations curated by our core board.</p>
      </div>

      <!-- FILTER CONTROLS -->
      <section class="animated-entrance" style="animation-delay: 0.1s; padding: 0;">
        <div class="filter-bar">
          <div class="filter-group" id="resource-filters">
            <button class="filter-btn-pill active" data-filter="all">All Items</button>
            <button class="filter-btn-pill" data-filter="PDF">PDF Guides</button>
            <button class="filter-btn-pill" data-filter="PPT">Slides (PPT)</button>
            <button class="filter-btn-pill" data-filter="Notes">Notes</button>
            <button class="filter-btn-pill" data-filter="Research Papers">Papers</button>
            <button class="filter-btn-pill" data-filter="Videos">Videos</button>
            <button class="filter-btn-pill" data-filter="GitHub Links">Links</button>
          </div>
          <div>
            <span style="font-size: 0.8rem; color: var(--text-muted);" id="resource-counter">Showing 0 resources</span>
          </div>
        </div>
      </section>

      <!-- RESOURCES GRID -->
      <section class="resources-grid animated-entrance" style="animation-delay: 0.2s; padding: 0; margin-bottom: 4rem;" id="resources-container">
        <!-- Resources Injected here -->
      </section>

    </main>
  </div>

  <script type="module" src="db.js"></script>
  <script type="module" src="shared.js"></script>
  <script type="module">
    let activeFilter = 'all';

    document.addEventListener('DOMContentLoaded', () => {
      window.injectTopBar('topbar-container');

      // Bind filter buttons
      document.querySelectorAll('#resource-filters button').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('#resource-filters button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeFilter = btn.getAttribute('data-filter');
          loadResources();
        });
      });

      // Bind dynamic search typing from top bar
      setTimeout(() => {
        const searchInput = document.querySelector('.global-search-input');
        if (searchInput) {
          searchInput.addEventListener('input', loadResources);
        }
      }, 500);

      loadResources();
    });

    async function loadResources() {
      if (!window.db) return;
      const resources = await window.db.find('Resources');
      const container = document.getElementById('resources-container');
      const counter = document.getElementById('resource-counter');
      const searchVal = document.querySelector('.global-search-input')?.value.toLowerCase() || '';

      const filtered = resources.filter(res => {
        const matchFilter = activeFilter === 'all' || res.category === activeFilter;
        const matchSearch = !searchVal || 
                            res.title.toLowerCase().includes(searchVal) ||
                            res.description.toLowerCase().includes(searchVal);
        return matchFilter && matchSearch;
      });

      counter.textContent = `Showing ${filtered.length} resources`;

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="glass-card" style="grid-column: 1 / -1; text-align: center; padding: 3rem;">
            <i class="fa-solid fa-folder-open" style="font-size: 2.5rem; color: var(--text-muted); margin-bottom: 1rem;"></i>
            <h4 style="font-size: 1.25rem;">No resources found</h4>
            <p style="color: var(--text-secondary); margin-top: 0.5rem;">Try modifying search parameters or clearing filters.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = filtered.map(res => {
        let typeClass = 'res-type-links';
        let icon = 'fa-link';
        let actText = 'Open External Link';
        let actIcon = 'fa-arrow-up-right-from-square';

        if (res.category === 'PDF') {
          typeClass = 'res-type-pdf';
          icon = 'fa-file-pdf';
          actText = 'Download PDF';
          actIcon = 'fa-download';
        } else if (res.category === 'PPT') {
          typeClass = 'res-type-ppt';
          icon = 'fa-file-powerpoint';
          actText = 'Download Slides';
          actIcon = 'fa-download';
        } else if (res.category === 'Notes') {
          typeClass = 'res-type-notes';
          icon = 'fa-file-lines';
          actText = 'View Notes';
          actIcon = 'fa-eye';
        } else if (res.category === 'Research Papers') {
          typeClass = 'res-type-research';
          icon = 'fa-graduation-cap';
          actText = 'Open Research paper';
          actIcon = 'fa-arrow-up-right-from-square';
        } else if (res.category === 'Videos') {
          typeClass = 'res-type-videos';
          icon = 'fa-video';
          actText = 'Stream Video';
          actIcon = 'fa-circle-play';
        }

        return `
          <div class="glass-card resource-card animated-entrance">
            <div class="glass-card-glow"></div>
            <div class="resource-header">
              <div class="resource-icon-wrapper ${typeClass}">
                <i class="fa-solid ${icon}"></i>
              </div>
              <span class="resource-size-badge">${res.size}</span>
            </div>
            
            <h4 style="font-size: 1.2rem; font-weight: 700; margin-bottom: 0.5rem;">${res.title}</h4>
            <p style="font-size: 0.85rem; color: var(--text-secondary); line-height: 1.4; margin-bottom: 1.5rem;">${res.description}</p>
            
            <button onclick="handleDownload('${res.title}', '${res.link}')" class="btn btn-secondary btn-sm resource-download-btn">
              ${actText} <i class="fa-solid ${actIcon}"></i>
            </button>
          </div>
        `;
      }).join('');
    }

    function handleDownload(title, link) {
      window.showToast('Accessing Resource', `Redirecting or initiating download for "${title}"`, 'success');
      setTimeout(() => {
        window.open(link, '_blank');
      }, 1000);
    }
  </script>
</body>
</html>
