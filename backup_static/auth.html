<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindcraft AI | Auth Portal</title>
  <meta name="description" content="Secure portal to sign up, sign in, and join the Mindcraft AI Club.">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-page {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      width: 100vw;
      position: relative;
      padding: 2rem;
    }
    .auth-card {
      width: 100%;
      max-width: 460px;
      padding: 3rem;
      border-radius: 28px;
    }
    .auth-tabs {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 2.5rem;
      border-bottom: 1px solid var(--glass-border);
      padding-bottom: 0.75rem;
    }
    .auth-tab-btn {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      padding-bottom: 0.5rem;
      transition: all var(--transition-fast);
    }
    .auth-tab-btn.active {
      color: hsl(var(--accent-primary));
      border-bottom-color: hsl(var(--accent-primary));
      text-shadow: 0 0 10px rgba(var(--accent-primary-rgb), 0.3);
    }
    .auth-form-wrapper {
      display: none;
    }
    .auth-form-wrapper.active {
      display: block;
      animation: slide-up-fade var(--transition-normal);
    }
    .auth-footer-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: hsl(var(--text-secondary));
    }
    .auth-footer-link a {
      color: hsl(var(--accent-primary));
      font-weight: 600;
    }
    .auth-footer-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  
  <div class="auth-page">
    <div class="glass-card auth-card animated-entrance">
      <div class="glass-card-glow"></div>
      
      <!-- AUTH TABS -->
      <div id="auth-main-tabs">
        <div class="auth-tabs">
          <button class="auth-tab-btn active" id="tab-signin-btn">Sign In</button>
          <button class="auth-tab-btn" id="tab-signup-btn">Sign Up</button>
        </div>
      </div>

      <!-- SIGN IN FORM -->
      <div class="auth-form-wrapper active" id="form-signin">
        <form id="signin-form">
          <div class="form-group">
            <label class="form-label-styled" for="signin-email">Email Address</label>
            <input type="email" class="form-control-styled" id="signin-email" required placeholder="name@email.com">
          </div>
          <div class="form-group">
            <label class="form-label-styled" for="signin-password">Password</label>
            <input type="password" class="form-control-styled" id="signin-password" required placeholder="••••••••">
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
            Sign In <i class="fa-solid fa-right-to-bracket"></i>
          </button>
        </form>
        <div class="auth-footer-link">
          <a href="#" id="goto-forgot-btn">Forgot Password?</a>
        </div>
      </div>

      <!-- SIGN UP FORM -->
      <div class="auth-form-wrapper" id="form-signup">
        <form id="signup-form">
          <div class="form-group">
            <label class="form-label-styled" for="signup-name">Full Name</label>
            <input type="text" class="form-control-styled" id="signup-name" required placeholder="Jane Doe">
          </div>
          <div class="form-group">
            <label class="form-label-styled" for="signup-email">Email Address</label>
            <input type="email" class="form-control-styled" id="signup-email" required placeholder="name@email.com">
          </div>
          <div class="form-group">
            <label class="form-label-styled" for="signup-password">Password (Min 6 chars)</label>
            <input type="password" class="form-control-styled" id="signup-password" required placeholder="••••••••" minlength="6">
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
            Sign Up <i class="fa-solid fa-user-plus"></i>
          </button>
        </form>
      </div>

      <!-- FORGOT PASSWORD FORM -->
      <div class="auth-form-wrapper" id="form-forgot">
        <div style="margin-bottom: 2rem;">
          <button class="btn btn-secondary btn-sm" id="forgot-back-btn" style="border-radius: 8px;"><i class="fa-solid fa-arrow-left"></i> Back</button>
        </div>
        <h3 style="font-size: 1.5rem; margin-bottom: 0.5rem; color:#fff;">Reset Password</h3>
        <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1.5rem;">Enter your email address to receive password recovery instructions.</p>
        <form id="forgot-form">
          <div class="form-group">
            <label class="form-label-styled" for="forgot-email">Email Address</label>
            <input type="email" class="form-control-styled" id="forgot-email" required placeholder="name@email.com">
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
            Send Recovery Email <i class="fa-solid fa-paper-plane"></i>
          </button>
        </form>
      </div>

    </div>
  </div>

  <script type="module" src="db.js"></script>
  <script type="module" src="shared.js"></script>
  <script type="module">
    document.addEventListener('DOMContentLoaded', () => {
      const tabSigninBtn = document.getElementById('tab-signin-btn');
      const tabSignupBtn = document.getElementById('tab-signup-btn');
      
      const formSignin = document.getElementById('form-signin');
      const formSignup = document.getElementById('form-signup');
      const formForgot = document.getElementById('form-forgot');
      const authTabs = document.getElementById('auth-main-tabs');

      // Routing parameters
      const urlParams = new URLSearchParams(window.location.search);
      const redirectUrl = urlParams.get('redirect') || 'index.html';

      // Tab switcher
      tabSigninBtn.addEventListener('click', () => {
        tabSigninBtn.classList.add('active');
        tabSignupBtn.classList.remove('active');
        formSignin.classList.add('active');
        formSignup.classList.remove('active');
        formForgot.classList.remove('active');
      });

      tabSignupBtn.addEventListener('click', () => {
        tabSignupBtn.classList.add('active');
        tabSigninBtn.classList.remove('active');
        formSignup.classList.add('active');
        formSignin.classList.remove('active');
        formForgot.classList.remove('active');
      });

      // Show forgot password
      document.getElementById('goto-forgot-btn').addEventListener('click', (e) => {
        e.preventDefault();
        authTabs.style.display = 'none';
        formSignin.classList.remove('active');
        formForgot.classList.add('active');
      });

      // Back from forgot password
      document.getElementById('forgot-back-btn').addEventListener('click', () => {
        authTabs.style.display = 'block';
        formForgot.classList.remove('active');
        formSignin.classList.add('active');
      });

      // Submit Sign In
      document.getElementById('signin-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('signin-email').value.trim();
        const password = document.getElementById('signin-password').value;
        
        try {
          const result = await window.db.login(email, password);
          window.showToast('Login Successful', `Welcome back, ${result.user.name}!`, 'success');
          
          setTimeout(() => {
            if (result.user.email === 'admin@club.com' || result.user.role === 'admin') {
              window.location.href = 'admin.html';
            } else {
              window.location.href = redirectUrl;
            }
          }, 1000);
        } catch (err) {
          window.showToast('Authentication Failed', err.message, 'error');
        }
      });

      // Submit Sign Up
      document.getElementById('signup-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('signup-name').value.trim();
        const email = document.getElementById('signup-email').value.trim();
        const password = document.getElementById('signup-password').value;
        
        try {
          const newUser = await window.db.register(name, email, password);
          window.showToast('Registration Successful', `Welcome to Mindcraft AI, ${name}!`, 'success');
          
          setTimeout(() => {
            window.location.href = redirectUrl;
          }, 1200);
        } catch (err) {
          window.showToast('Signup Failed', err.message, 'error');
        }
      });

      // Submit Forgot Password (Firebase Real Password Reset)
      document.getElementById('forgot-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('forgot-email').value.trim();
        try {
          await window.db.forgotPassword(email);
          window.showToast('Reset Link Dispatched', `Instructions sent to ${email}`, 'success');
          setTimeout(() => {
            authTabs.style.display = 'block';
            formForgot.classList.remove('active');
            formSignin.classList.add('active');
          }, 2000);
        } catch (err) {
          window.showToast('Reset Failed', err.message, 'error');
        }
      });
    });
  </script>
</body>
</html>
