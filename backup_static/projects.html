<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindcraft AI | Projects Hub</title>
  <meta name="description" content="View engineering systems, frameworks, and web architectures designed by Mindcraft AI members.">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css">
  <style>
    .project-card {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .project-cover {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 1.25rem;
      border: 1px solid var(--glass-border);
    }
    .project-status-badge {
      position: absolute;
      top: 1.25rem;
      right: 1.25rem;
      font-size: 0.75rem;
      padding: 0.25rem 0.6rem;
      border-radius: 6px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .status-completed {
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: rgb(52, 211, 153);
    }
    .status-inprogress {
      background: rgba(245, 158, 11, 0.15);
      border: 1px solid rgba(245, 158, 11, 0.3);
      color: rgb(251, 191, 36);
    }
    .project-tech-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin: 1rem 0;
    }
    .project-tech-badge {
      font-size: 0.75rem;
      background: rgba(0, 229, 255, 0.1);
      border: 1px solid rgba(0, 229, 255, 0.25);
      color: hsl(var(--accent-secondary));
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      font-weight: 600;
    }
    .project-team {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      border-top: 1px dashed var(--glass-border);
      padding-top: 0.75rem;
    }
    .project-links {
      display: flex;
      gap: 1rem;
      margin-top: auto;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <!-- Sidebar Container -->
    <div id="sidebar-container"></div>
    
    <!-- Main Content Area -->
    <main class="main-content">
      <!-- Top Bar Container -->
      <div id="topbar-container"></div>
      
      <!-- PAGE HEADER -->
      <div class="page-header animated-entrance">
        <span class="page-tag"><i class="fa-solid fa-briefcase"></i> Portfolio</span>
        <h2 class="page-title">Featured Projects</h2>
        <p class="page-subtitle">Explore the creative software developments, hardware integrations, and web services created by our club members.</p>
      </div>

      <!-- FILTER CONTROLS -->
      <section class="animated-entrance" style="animation-delay: 0.1s; padding: 0;">
        <div class="filter-bar">
          <div class="filter-group" id="project-filters">
            <button class="filter-btn-pill active" data-filter="all">All Projects</button>
            <button class="filter-btn-pill" data-filter="Completed">Completed</button>
            <button class="filter-btn-pill" data-filter="In Progress">In Progress</button>
          </div>
          <div>
            <span style="font-size: 0.8rem; color: var(--text-muted);" id="project-counter">Showing 0 projects</span>
          </div>
        </div>
      </section>

      <!-- PROJECTS GRID -->
      <section class="board-grid animated-entrance" style="animation-delay: 0.2s; padding: 0; margin-bottom: 4rem;" id="projects-container">
        <!-- Projects injected here -->
      </section>

    </main>
  </div>

  <script type="module" src="db.js"></script>
  <script type="module" src="shared.js"></script>
  <script type="module">
    let activeFilter = 'all';

    document.addEventListener('DOMContentLoaded', () => {
      window.injectTopBar('topbar-container');

      // Bind filter buttons
      document.querySelectorAll('#project-filters button').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('#project-filters button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeFilter = btn.getAttribute('data-filter');
          loadProjects();
        });
      });

      // Bind dynamic search typing from top bar
      setTimeout(() => {
        const searchInput = document.querySelector('.global-search-input');
        if (searchInput) {
          searchInput.addEventListener('input', loadProjects);
        }
      }, 500);

      loadProjects();
    });

    async function loadProjects() {
      if (!window.db) return;
      const projects = await window.db.find('Projects');
      const container = document.getElementById('projects-container');
      const counter = document.getElementById('project-counter');
      const searchVal = document.querySelector('.global-search-input')?.value.toLowerCase() || '';

      const filtered = projects.filter(p => {
        const matchFilter = activeFilter === 'all' || p.status === activeFilter;
        const matchSearch = !searchVal || 
                            p.title.toLowerCase().includes(searchVal) ||
                            p.description.toLowerCase().includes(searchVal) ||
                            p.tech.some(t => t.toLowerCase().includes(searchVal));

        return matchFilter && matchSearch;
      });

      counter.textContent = `Showing ${filtered.length} projects`;

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="glass-card" style="grid-column: 1 / -1; text-align: center; padding: 3rem;">
            <i class="fa-solid fa-code-merge" style="font-size: 2.5rem; color: var(--text-muted); margin-bottom: 1rem;"></i>
            <h4 style="font-size: 1.25rem;">No projects found</h4>
            <p style="color: var(--text-secondary); margin-top: 0.5rem;">Try modifying search parameters or selecting another status.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = filtered.map(p => {
        const techBadges = p.tech.map(t => `<span class="project-tech-badge">${t}</span>`).join('');
        const isCompleted = p.status === 'Completed';
        
        return `
          <div class="glass-card project-card animated-entrance">
            <div class="glass-card-glow"></div>
            <span class="project-status-badge ${isCompleted ? 'status-completed' : 'status-inprogress'}">${p.status}</span>
            <img class="project-cover" src="${p.image || 'https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=400'}" alt="${p.title}">
            <h4 style="font-size: 1.35rem; font-weight: 700; margin-bottom: 0.5rem; color: hsl(var(--text-primary));">${p.title}</h4>
            <p style="font-size: 0.9rem; color: var(--text-secondary); line-height: 1.5; margin-bottom: 1rem;">${p.description}</p>
            
            <div class="project-tech-list">
              ${techBadges}
            </div>

            <div class="project-team">
              <i class="fa-solid fa-users-gear"></i> Team: <strong>${p.members.join(', ')}</strong>
            </div>

            <div class="project-links">
              <a href="${p.github}" target="_blank" class="btn btn-secondary btn-sm" style="border-radius: 8px;"><i class="fa-brands fa-github"></i> Repository</a>
              <a href="${p.live}" target="_blank" class="btn btn-primary btn-sm" style="border-radius: 8px;"><i class="fa-solid fa-arrow-up-right-from-square"></i> Live Demo</a>
            </div>
          </div>
        `;
      }).join('');
    }
  </script>
</body>
</html>
