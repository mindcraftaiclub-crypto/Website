<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindcraft AI | Gallery</title>
  <meta name="description" content="Browse visual highlights, workshop albums, and competition photos from Mindcraft AI events.">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css">
  <style>
    .gallery-masonry {
      columns: 3 320px;
      column-gap: 1.5rem;
      margin-bottom: 4rem;
    }
    .gallery-item {
      break-inside: avoid;
      margin-bottom: 1.5rem;
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--glass-border);
      cursor: pointer;
      background: var(--glass-bg);
    }
    .gallery-img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform var(--transition-normal);
    }
    .gallery-item:hover .gallery-img {
      transform: scale(1.05);
    }
    .gallery-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8), rgba(0,0,0,0.2) 60%, transparent);
      opacity: 0;
      transition: opacity var(--transition-normal);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 1.5rem;
      color: #fff;
    }
    .gallery-item:hover .gallery-overlay {
      opacity: 1;
    }
    .gallery-cat-badge {
      align-self: flex-start;
      font-size: 0.7rem;
      background: hsl(var(--accent-secondary));
      color: #000;
      font-weight: 700;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <!-- Sidebar Container -->
    <div id="sidebar-container"></div>
    
    <!-- Main Content Area -->
    <main class="main-content">
      <!-- Top Bar Container -->
      <div id="topbar-container"></div>
      
      <!-- PAGE HEADER -->
      <div class="page-header animated-entrance">
        <span class="page-tag"><i class="fa-solid fa-image"></i> Media</span>
        <h2 class="page-title">Gallery & Archives</h2>
        <p class="page-subtitle">A visual showcase of our developer meetups, workshops, hackathons, and achievements.</p>
      </div>

      <!-- FILTER BAR -->
      <section class="animated-entrance" style="animation-delay: 0.1s; padding: 0;">
        <div class="filter-bar">
          <div class="filter-group" id="gallery-filters">
            <button class="filter-btn-pill active" data-filter="all">All Photos</button>
            <button class="filter-btn-pill" data-filter="Events">Events</button>
            <button class="filter-btn-pill" data-filter="Workshop">Workshops</button>
            <button class="filter-btn-pill" data-filter="Hackathon">Hackathons</button>
            <button class="filter-btn-pill" data-filter="Seminar">Seminars</button>
            <button class="filter-btn-pill" data-filter="Achievement">Achievements</button>
          </div>
          <div>
            <span style="font-size: 0.8rem; color: var(--text-muted);" id="photo-counter">0 photos available</span>
          </div>
        </div>
      </section>

      <!-- MASONRY GRID -->
      <section class="animated-entrance" style="animation-delay: 0.2s; padding: 0;">
        <div class="gallery-masonry" id="gallery-container">
          <!-- Injected items -->
        </div>
      </section>

    </main>
  </div>

  <!-- LIGHTBOX CONTAINER -->
  <div class="lightbox" id="app-lightbox">
    <span class="lightbox-close" id="lightbox-close-btn">&times;</span>
    <img class="lightbox-content" id="lightbox-img" src="" alt="View Image">
    <div style="position: absolute; bottom: 2rem; color: white; text-align: center; max-width: 600px; padding: 0 1rem;">
      <h4 id="lightbox-title" style="font-size: 1.25rem; font-family: var(--font-body); margin-bottom: 0.5rem;"></h4>
      <p id="lightbox-desc" style="font-size: 0.9rem; opacity: 0.8;"></p>
    </div>
  </div>

  <script type="module" src="db.js"></script>
  <script type="module" src="shared.js"></script>
  <script type="module">
    let activeFilter = 'all';

    document.addEventListener('DOMContentLoaded', () => {
      window.injectTopBar('topbar-container');

      // Bind filter buttons
      document.querySelectorAll('#gallery-filters button').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('#gallery-filters button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeFilter = btn.getAttribute('data-filter');
          loadGallery();
        });
      });

      // Lightbox Close triggers
      const lightbox = document.getElementById('app-lightbox');
      document.getElementById('lightbox-close-btn').addEventListener('click', () => {
        lightbox.classList.remove('active');
      });
      lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) lightbox.classList.remove('active');
      });

      loadGallery();
    });

    async function loadGallery() {
      if (!window.db) return;
      const gallery = await window.db.find('Gallery');
      const container = document.getElementById('gallery-container');
      const counter = document.getElementById('photo-counter');

      const filtered = gallery.filter(item => activeFilter === 'all' || item.category === activeFilter);
      counter.textContent = `Showing ${filtered.length} photos`;

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="glass-card" style="width: 100%; text-align: center; padding: 3rem; grid-column: span 3;">
            <i class="fa-solid fa-panorama" style="font-size: 2.5rem; color: var(--text-muted); margin-bottom: 1rem;"></i>
            <h4 style="font-size: 1.25rem;">No media items found</h4>
            <p style="color: var(--text-secondary); margin-top: 0.5rem;">Try another filter criteria.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = filtered.map(item => `
        <div class="gallery-item animated-entrance" onclick="openLightbox('${item.image}', '${item.title}', '${item.description}')">
          <img class="gallery-img" src="${item.image}" alt="${item.title}" loading="lazy">
          <div class="gallery-overlay">
            <span class="gallery-cat-badge">${item.category}</span>
            <h4 style="font-size: 1.05rem; font-weight: 600; text-overflow: ellipsis; white-space: nowrap; overflow: hidden;">${item.title}</h4>
            <p style="font-size: 0.8rem; opacity: 0.8; text-overflow: ellipsis; white-space: nowrap; overflow: hidden; margin-top: 0.15rem;">${item.description}</p>
          </div>
        </div>
      `).join('');
    }

    function openLightbox(src, title, desc) {
      const lightbox = document.getElementById('app-lightbox');
      const img = document.getElementById('lightbox-img');
      const titleEl = document.getElementById('lightbox-title');
      const descEl = document.getElementById('lightbox-desc');

      img.src = src;
      titleEl.textContent = title;
      descEl.textContent = desc;
      lightbox.classList.add('active');
    }
  </script>
</body>
</html>
