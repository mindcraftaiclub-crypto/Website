<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mindcraft AI | Events</title>
  <meta name="description" content="Register for upcoming engineering seminars, workshops, and cybersecurity capture-the-flag hackathons conducted by Mindcraft AI.">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css">
  <style>
    .events-list {
      display: flex;
      flex-direction: column;
      gap: 2rem;
      margin-bottom: 4rem;
    }
    .event-item-card {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 2rem;
      overflow: hidden;
      padding: 0;
    }
    .event-poster-wrapper {
      position: relative;
      height: 100%;
      min-height: 220px;
    }
    .event-item-poster {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .event-body {
      padding: 2rem 2rem 2rem 0;
      display: flex;
      flex-direction: column;
    }
    .event-meta-line {
      display: flex;
      gap: 1.5rem;
      font-size: 0.85rem;
      color: hsl(var(--accent-secondary));
      font-weight: 600;
      margin-bottom: 0.75rem;
    }
    
    /* Countdown clocks styles */
    .countdown-timer-box {
      margin-top: 1rem;
      background: rgba(0, 229, 255, 0.05);
      border: 1px dashed rgba(0, 229, 255, 0.2);
      border-radius: 12px;
      padding: 0.75rem 1.25rem;
      display: inline-flex;
      align-items: center;
      gap: 1rem;
      align-self: flex-start;
    }
    .countdown-segment {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .countdown-val {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 800;
      color: hsl(var(--text-primary));
    }
    .countdown-lbl {
      font-size: 0.65rem;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    
    @media(max-width: 900px) {
      .event-item-card {
        grid-template-columns: 1fr;
        gap: 0;
      }
      .event-poster-wrapper {
        height: 200px;
      }
      .event-body {
        padding: 2rem;
      }
    }
  </style>
</head>
<body>

  <div class="app-container">
    <!-- Sidebar Container -->
    <div id="sidebar-container"></div>
    
    <!-- Main Content Area -->
    <main class="main-content">
      <!-- Top Bar Container -->
      <div id="topbar-container"></div>
      
      <!-- PAGE HEADER -->
      <div class="page-header animated-entrance">
        <span class="page-tag"><i class="fa-solid fa-calendar-check"></i> Timeline</span>
        <h2 class="page-title">Events Schedule</h2>
        <p class="page-subtitle">Participate in hands-on workshops, engineering bootcamps, and networking summits. Register early to save your seat.</p>
      </div>

      <!-- UPCOMING EVENTS -->
      <h3 style="font-size: 1.5rem; margin-bottom: 1.5rem;" class="animated-entrance"><i class="fa-solid fa-hourglass-start" style="color: hsl(var(--accent-secondary));"></i> Upcoming Assemblies</h3>
      <div class="events-list animated-entrance" style="animation-delay: 0.1s;" id="upcoming-events-container">
        <!-- Upcoming Injected Here -->
      </div>

      <!-- PAST EVENTS -->
      <h3 style="font-size: 1.5rem; margin-bottom: 1.5rem;" class="animated-entrance"><i class="fa-solid fa-hourglass-end" style="color: var(--text-muted);"></i> Completed Archive</h3>
      <div class="events-list animated-entrance" style="animation-delay: 0.2s;" id="past-events-container">
        <!-- Past Injected Here -->
      </div>

    </main>
  </div>

  <script src="db.js"></script>
  <script src="shared.js"></script>
  <script>
    let activeIntervals = [];

    document.addEventListener('DOMContentLoaded', () => {
      window.injectTopBar('topbar-container');
      loadEvents();
    });

    async function loadEvents() {
      if (!window.db) return;
      
      // Clear old intervals
      activeIntervals.forEach(clearInterval);
      activeIntervals = [];

      const events = await window.db.find('Events');
      const upcomingContainer = document.getElementById('upcoming-events-container');
      const pastContainer = document.getElementById('past-events-container');
      
      const currentUser = window.db.getCurrentUser();
      const now = new Date('2026-06-26T16:05:00+05:30'); // Matching user timestamp context

      const upcoming = events.filter(e => new Date(e.date + 'T' + e.time) >= now).sort((a,b) => new Date(a.date) - new Date(b.date));
      const past = events.filter(e => new Date(e.date + 'T' + e.time) < now).sort((a,b) => new Date(b.date) - new Date(a.date));

      // 1. Render Upcoming
      if (upcoming.length === 0) {
        upcomingContainer.innerHTML = `
          <div class="glass-card" style="text-align: center; padding: 3rem;">
            <i class="fa-solid fa-calendar-xmark" style="font-size: 2.5rem; color: var(--text-muted); margin-bottom: 1rem;"></i>
            <h4 style="font-size: 1.25rem;">No upcoming events listed</h4>
            <p style="color: var(--text-secondary); margin-top: 0.5rem;">Check back later or view completed projects.</p>
          </div>
        `;
      } else {
        upcomingContainer.innerHTML = upcoming.map(e => {
          const isRegistered = currentUser && e.registeredUsers.includes(currentUser.id);
          const regBtnText = isRegistered ? 'Registered <i class="fa-solid fa-check"></i>' : 'Register Seat <i class="fa-solid fa-ticket"></i>';
          const regBtnClass = isRegistered ? 'btn-secondary' : 'btn-primary';
          
          return `
            <div class="glass-card event-item-card animated-entrance">
              <div class="glass-card-glow"></div>
              <div class="event-poster-wrapper">
                <img class="event-item-poster" src="${e.poster}" alt="${e.title}">
              </div>
              <div class="event-body">
                <div class="event-meta-line">
                  <span><i class="fa-solid fa-location-dot"></i> ${e.venue}</span>
                  <span><i class="fa-solid fa-clock"></i> ${e.date} @ ${e.time}</span>
                </div>
                <h4 style="font-size: 1.4rem; font-weight: 700; margin-bottom: 0.75rem;">${e.title}</h4>
                <p style="font-size: 0.95rem; color: var(--text-secondary); line-height: 1.5; margin-bottom: 1rem;">${e.description}</p>
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: auto; flex-wrap: wrap; gap: 1rem;">
                  <!-- Countdown timer wrapper -->
                  <div class="countdown-timer-box" id="timer-${e.id}">
                    <span style="font-size: 0.8rem; color: var(--text-muted);"><i class="fa-solid fa-stopwatch"></i> Starting in:</span>
                    <div class="countdown-segment"><span class="countdown-val" id="days-${e.id}">00</span><span class="countdown-lbl">d</span></div>
                    <div class="countdown-segment"><span class="countdown-val" id="hours-${e.id}">00</span><span class="countdown-lbl">h</span></div>
                    <div class="countdown-segment"><span class="countdown-val" id="mins-${e.id}">00</span><span class="countdown-lbl">m</span></div>
                    <div class="countdown-segment"><span class="countdown-val" id="secs-${e.id}">00</span><span class="countdown-lbl">s</span></div>
                  </div>
                  
                  <button onclick="registerEvent('${e.id}', ${isRegistered})" class="btn ${regBtnClass}" style="border-radius: 8px;">
                    ${regBtnText}
                  </button>
                </div>
              </div>
            </div>
          `;
        }).join('');

        // Start countdown triggers
        upcoming.forEach(e => {
          startCountdown(e.id, e.date + 'T' + e.time);
        });
      }

      // 2. Render Past
      if (past.length === 0) {
        pastContainer.innerHTML = `<p style="color: var(--text-muted); font-style: italic;">No past archive records.</p>`;
      } else {
        pastContainer.innerHTML = past.map(e => `
          <div class="glass-card event-item-card animated-entrance" style="opacity: 0.75;">
            <div class="event-poster-wrapper">
              <img class="event-item-poster" src="${e.poster}" alt="${e.title}" style="filter: grayscale(80%);">
            </div>
            <div class="event-body">
              <div class="event-meta-line" style="color: var(--text-muted);">
                <span><i class="fa-solid fa-location-dot"></i> ${e.venue}</span>
                <span><i class="fa-solid fa-calendar-check"></i> Completed on ${e.date}</span>
              </div>
              <h4 style="font-size: 1.3rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--text-secondary);">${e.title}</h4>
              <p style="font-size: 0.9rem; color: var(--text-muted); line-height: 1.4; margin-bottom: 1rem;">${e.description}</p>
              <div style="margin-top: auto; display: flex; align-items: center; gap: 1rem;">
                <span class="btn btn-secondary btn-sm" style="border-radius: 8px; opacity: 0.6; pointer-events: none;"><i class="fa-solid fa-circle-check"></i> Event Completed</span>
                <span style="font-size: 0.8rem; color: var(--text-muted);">${e.registeredUsers.length} members participated</span>
              </div>
            </div>
          </div>
        `).join('');
      }
    }

    function startCountdown(id, targetStr) {
      const targetDate = new Date(targetStr).getTime();
      
      const updateClock = () => {
        const now = new Date().getTime();
        const difference = targetDate - now;

        const dEl = document.getElementById(`days-${id}`);
        const hEl = document.getElementById(`hours-${id}`);
        const mEl = document.getElementById(`mins-${id}`);
        const sEl = document.getElementById(`secs-${id}`);

        if (!dEl || !hEl || !mEl || !sEl) return;

        if (difference <= 0) {
          document.getElementById(`timer-${id}`).innerHTML = `
            <span style="font-size: 0.85rem; color: hsl(350, 80%, 60%); font-weight:700;"><i class="fa-solid fa-circle-dot"></i> Live / Assembly Commencing</span>
          `;
          return;
        }

        const days = Math.floor(difference / (1000 * 60 * 60 * 24));
        const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((difference % (1000 * 60)) / 1000);

        dEl.textContent = String(days).padStart(2, '0');
        hEl.textContent = String(hours).padStart(2, '0');
        mEl.textContent = String(minutes).padStart(2, '0');
        sEl.textContent = String(seconds).padStart(2, '0');

        // Add warning pulse if less than 24 hours
        if (difference < (1000 * 60 * 60 * 24)) {
          document.getElementById(`timer-${id}`).classList.add('warning');
        }
      };

      updateClock(); // Initial run
      const intervalId = setInterval(updateClock, 1000);
      activeIntervals.push(intervalId);
    }

    async function registerEvent(id, isRegistered) {
      const currentUser = window.db.getCurrentUser();
      if (!currentUser) {
        window.showToast('Auth Required', 'You must login to register for events.', 'warning');
        setTimeout(() => {
          window.location.href = 'auth.html?redirect=events.html';
        }, 1500);
        return;
      }

      try {
        const events = await window.db.find('Events');
        const evt = events.find(e => e.id === id);
        
        let users = evt.registeredUsers || [];
        if (isRegistered) {
          // Cancel registration
          users = users.filter(uId => uId !== currentUser.id);
          window.showToast('Seat Cancelled', 'Your registration was removed.', 'info');
        } else {
          // Register
          users.push(currentUser.id);
          window.showToast('Registered Successful', `We reserved your seat for ${evt.title}! Check your email for guidelines.`, 'success');
        }

        await window.db.update('Events', id, { registeredUsers: users });
        loadEvents();
      } catch(err) {
        window.showToast('Action Failed', err.message, 'error');
      }
    }
  </script>
</body>
</html>
